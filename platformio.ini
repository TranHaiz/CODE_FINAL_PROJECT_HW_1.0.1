; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:4d_systems_esp32s3_gen4_r8n16]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino
lib_ldf_mode = chain
lib_compat_mode = off
build_flags = 
	-DLV_CONF_INCLUDE_SIMPLE=1
	-DLV_CONF_PATH=\"lv_conf.h\"
	-I lib/sys
	-I lib/middleware
	-I lib/bsp
	-I lib/common
	-I lib/driver
	-I .pio/libdeps/4d_systems_esp32s3_gen4_r8n16/lvgl/src
	-I .pio/libdeps/4d_systems_esp32s3_gen4_r8n16/RTClib/src
	-I .pio/libdeps/4d_systems_esp32s3_gen4_r8n16/Adafruit_BusIO/
	-I C:/Users/haiha/.platformio/packages/framework-arduinoespressif32/libraries/Wire/src
lib_deps = 
	mikalhart/TinyGPSPlus@^1.1.0
	bodmer/TFT_eSPI@^2.5.43
	lvgl/lvgl@^9.1.0
	luciansabo/Sharp GP2Y Dust Sensor@^1.1.0
	sparkfun/SparkFun LSM6DS3 Breakout@^1.0.3
	adafruit/Adafruit SHT31 Library @ ^2.2.2
	adafruit/RTClib @ ^2.1.3
	Wire
	vshymanskyy/TinyGSM @ ^0.11.7
	adafruit/Adafruit BusIO@^1.16.1
	knolleary/PubSubClient @ ^2.8
	robtillaart/INA226@^0.6.6
	adafruit/Adafruit INA219@^1.2.3
